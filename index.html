<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Galeria de GIFs</title>
    <style>
        /* --- Reset e Estilos Básicos --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Evita barras de rolagem na intro */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000033; /* Fundo azul escuro base */
        }

        /* --- Fundo Animado (Efeitos de Luz) --- */
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #001f4d 0%, #00001a 100%);
            z-index: -2;
        }

        /* Partículas/Luzes voando (simples) */
        .lights {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .light {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: fly 10s infinite linear;
        }

        @keyframes fly {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* Gerando algumas luzes com tamanhos e durações diferentes via CSS */
        .light:nth-child(1) { width: 10px; height: 10px; left: 10%; animation-duration: 8s; animation-delay: 1s; }
        .light:nth-child(2) { width: 15px; height: 15px; left: 30%; animation-duration: 12s; animation-delay: 3s; }
        .light:nth-child(3) { width: 8px; height: 8px; left: 50%; animation-duration: 10s; animation-delay: 0s; }
        .light:nth-child(4) { width: 12px; height: 12px; left: 70%; animation-duration: 15s; animation-delay: 5s; }
        .light:nth-child(5) { width: 20px; height: 20px; left: 90%; animation-duration: 9s; animation-delay: 2s; }


        /* --- Efeito de Texto Gradiente Animado (MixIn) --- */
        .gradient-text-anim {
            background: linear-gradient(270deg, #ffffff, #007bff, #ffffff, #007bff);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientAnimation 5s ease infinite;
        }

        /* --- Efeito de Botão Gradiente Animado (MixIn) --- */
        .gradient-btn-anim {
            background: linear-gradient(270deg, #007bff, #ffffff, #007bff, #ffffff);
            background-size: 400% 400%;
            color: #000033; /* Cor do texto no botão */
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: transform 0.2s, box-shadow 0.2s;
            animation: gradientAnimation 5s ease infinite;
            text-decoration: none;
            display: inline-block;
        }

        .gradient-btn-anim:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        @keyframes gradientAnimation {
            0%{background-position:0% 50%}
            50%{background-position:100% 50%}
            100%{background-position:0% 50%}
        }


        /* --- Tela de Introdução (Intro) --- */
        #intro-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            transition: opacity 1s ease-out, visibility 1s ease-out;
        }

        #intro-screen h1 {
            font-size: 4em;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* --- Tela da Galeria (Escondida inicialmente) --- */
        #gallery-screen {
            display: none; /* Escondido */
            opacity: 0;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
            transition: opacity 1s ease-in;
            overflow-y: auto; /* Permite rolar o conteúdo da galeria */
            padding: 20px;
            box-sizing: border-box;
            color: white;
            text-align: center;
        }

        #gallery-screen.active {
            display: block;
            opacity: 1;
        }
        
        /* Impede o scroll do body quando a galeria está ativa, usa o scroll interno */
        body.gallery-active {
            overflow: hidden;
        }


        /* Estilos da Galeria */
        .profile-frame {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid #fff;
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.7);
            overflow: hidden;
            margin: 20px auto;
        }

        .profile-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #gallery-screen h2 {
            font-size: 3em;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .nav-buttons {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* Botão Voltar específico */
        .btn-voltar {
            background: #6c757d; /* Cinza para diferenciar */
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-voltar:hover {
            background: #5a6268;
        }


        /* --- Seções de Conteúdo (Modelos) --- */
        .content-section {
            display: none; /* Escondido por padrão */
            margin-top: 30px;
            text-align: left;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }

        .content-section.active {
            display: block;
        }

        .animated-bar {
            background: linear-gradient(90deg, #007bff, #00c6ff, #007bff);
            background-size: 200% auto;
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 20px;
            animation: barAnimation 3s linear infinite;
        }

        @keyframes barAnimation {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .gif-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .gif-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            transition: transform 0.2s;
        }

        .gif-item:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.2);
        }

        .gif-item img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            display: block;
            margin-bottom: 10px;
        }

        .gif-item span {
            font-size: 0.9em;
            color: #ccc;
        }

    </style>
</head>
<body>

    <div class="background-animation">
        <div class="lights">
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
        </div>
    </div>

    <div id="intro-screen">
        <h1 class="gradient-text-anim">Galeria de Gifs</h1>
        <button class="gradient-btn-anim" id="btn-entrar">Entrar</button>
    </div>

    <div id="gallery-screen">
        
        <div class="profile-frame">
            <img src="https://imgur.com/7rKeKT8.png" alt="Foto de Perfil">
        </div>

        <h2 class="gradient-text-anim">GALERIA</h2>

        <div class="nav-buttons">
            <button class="btn-voltar" id="btn-voltar-intro">Voltar para Início</button>
            <button class="gradient-btn-anim" id="btn-gifs">Gifs</button>
            <button class="gradient-btn-anim" id="btn-pcback">pcback gif</button>
            <button class="gradient-btn-anim" id="btn-pstyle">Pstyle Gif</button>
        </div>

        <div id="section-gifs" class="content-section">
            
            <div class="animated-bar">Modelo Afterefects</div>
            <div class="gif-grid">
                <div class="gif-item"><img src="https://imgur.com/5HxfNaB.gif" alt="After 1"><span>After 1</span></div>
                <div class="gif-item"><img src="https://imgur.com/FILAVQP.gif" alt="After 2"><span>After 2</span></div>
                <div class="gif-item"><img src="https://imgur.com/5IoR515.gif" alt="After 3"><span>After 3</span></div>
                <div class="gif-item"><img src="https://imgur.com/KUQ1WsX.gif" alt="After 4"><span>After 4</span></div>
                <div class="gif-item"><img src="https://imgur.com/ZuaO9n5.gif" alt="After 5"><span>After 5</span></div>
            </div>

            <div class="animated-bar">Modelo Blufftitler</div>
            <div class="gif-grid">
                <div class="gif-item"><img src="https://imgur.com/65bzz5V.gif" alt="Bluff 1"><span>Bluff 1</span></div>
                <div class="gif-item"><img src="https://imgur.com/ZetkVFF.gif" alt="Bluff 2"><span>Bluff 2</span></div>
                <div class="gif-item"><img src="https://imgur.com/JqzxOwt.gif" alt="Bluff 3"><span>Bluff 3</span></div>
                <div class="gif-item"><img src="https://imgur.com/NK9Z8rU.gif" alt="Bluff 4"><span>Bluff 4</span></div>
                <div class="gif-item"><img src="https://imgur.com/RNIlFI3.gif" alt="Bluff 5"><span>Bluff 5</span></div>
            </div>
        </div>

        <div id="section-pcback" class="content-section">
            <div class="animated-bar">Pcback GIFs (728x486 approx)</div>
            <div class="gif-grid" style="grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));">
                <div class="gif-item"><img src="https://i.imgur.com/SFnk7A6.gif" alt="Pcback 1" style="max-width: 728px;"><span>Pcback 1</span></div>
                <div class="gif-item"><img src="https://i.imgur.com/KKY2zqU.gif" alt="Pcback 2" style="max-width: 728px;"><span>Pcback 2</span></div>
                <div class="gif-item"><img src="https://i.imgur.com/fmhynyY.gif" alt="Pcback 3" style="max-width: 728px;"><span>Pcback 3</span></div>
            </div>
        </div>

        <div id="section-pstyle" class="content-section">
            <div class="animated-bar">Pstyle GIFs</div>
            <div class="gif-grid">
                <div class="gif-item"><img src="https://imgur.com/rUIzfWU.gif" alt="Pstyle 1"><span>Pstyle 1</span></div>
                <div class="gif-item"><img src="https://imgur.com/dGfJDfh.gif" alt="Pstyle 2"><span>Pstyle 2</span></div>
                <div class="gif-item"><img src="https://imgur.com/ZXBA6F1.gif" alt="Pstyle 3"><span>Pstyle 3</span></div>
                <div class="gif-item"><img src="https://imgur.com/dImC226.gif" alt="Pstyle 4"><span>Pstyle 4</span></div>
            </div>
        </div>

    </div>

    <script>
        // --- Elementos ---
        const introScreen = document.getElementById('intro-screen');
        const galleryScreen = document.getElementById('gallery-screen');
        const btnEntrar = document.getElementById('btn-entrar');
        const btnVoltarIntro = document.getElementById('btn-voltar-intro');
        
        const btnGifs = document.getElementById('btn-gifs');
        const btnPcback = document.getElementById('btn-pcback');
        const btnPstyle = document.getElementById('btn-pstyle');

        const sectionGifs = document.getElementById('section-gifs');
        const sectionPcback = document.getElementById('section-pcback');
        const sectionPstyle = document.getElementById('section-pstyle');
        
        const allSections = [sectionGifs, sectionPcback, sectionPstyle];

        // --- Funções de Transição de Tela ---
        function showGallery() {
            introScreen.style.opacity = '0';
            setTimeout(() => {
                introScreen.style.visibility = 'hidden';
                galleryScreen.classList.add('active');
                document.body.classList.add('gallery-active'); // Ativa scroll interno
            }, 1000); // Tempo da transição CSS
        }

        function showIntro() {
            galleryScreen.classList.remove('active');
            document.body.classList.remove('gallery-active');
            setTimeout(() => {
                introScreen.style.visibility = 'visible';
                introScreen.style.opacity = '1';
            }, 100); // Pequeno delay para garantir a animação de volta
        }

        // --- Função para Alternar Seções de Conteúdo ---
        function showSection(sectionToShow) {
            allSections.forEach(section => {
                section.classList.remove('active');
            });
            sectionToShow.classList.add('active');
        }


        // --- Event Listeners ---
        
        // Entrar na Galeria
        btnEntrar.addEventListener('click', showGallery);

        // Voltar para a Home
        btnVoltarIntro.addEventListener('click', showIntro);

        // Botões de Categoria
        btnGifs.addEventListener('click', () => showSection(sectionGifs));
        btnPcback.addEventListener('click', () => showSection(sectionPcback));
        btnPstyle.addEventListener('click', () => showSection(sectionPstyle));

    </script>
</body>
</html>
