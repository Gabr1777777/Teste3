<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Galeria de GIFs</title>
    <style>
        /* --- Reset e Estilos Básicos --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000022; 
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
        }

        /* --- MENSAGEM DE ALERTA --- */
        #custom-alert {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 31, 77, 0.95);
            border: 2px solid #007bff;
            color: white;
            padding: 20px 40px;
            border-radius: 10px;
            z-index: 9999;
            box-shadow: 0 0 30px rgba(0, 123, 255, 0.5);
            text-align: center;
            font-weight: bold;
        }

        /* --- FUNDO ANIMADO --- */
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #001f4d 0%, #00001a 100%);
            z-index: -1;
            overflow: hidden;
        }

        .big-star {
            position: absolute;
            background: white;
            border-radius: 50%;
            filter: blur(1px);
            box-shadow: 0 0 10px white;
            animation: bigStarBlink 4s infinite ease-in-out;
        }

        @keyframes bigStarBlink {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }

        /* --- ESTILO DO CONTADOR --- */
        .realtime-counter {
            color: #007bff;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1.3rem;
            text-shadow: 0 0 10px #007bff;
            margin-bottom: 5px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .v-number {
            color: #fff;
            text-shadow: 0 0 15px #007bff, 0 0 25px #007bff;
        }

        /* --- ANIMAÇÕES E COMPONENTES --- */
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .gradient-text-anim {
            background: linear-gradient(270deg, #ffffff, #007bff, #ffffff, #007bff);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientMove 5s ease infinite;
        }

        .gradient-btn-anim {
            background: linear-gradient(270deg, #007bff, #ffffff, #007bff, #ffffff);
            background-size: 400% 400%;
            color: #000033;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            animation: gradientMove 5s ease infinite;
        }

        #btn-entrar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            animation: gradientMove 5s ease infinite, floating 3s ease-in-out infinite;
        }

        /* --- TELAS --- */
        #intro-screen {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            width: 100%; height: 100%; position: absolute; z-index: 10;
        }

        #gallery-screen {
            display: none; opacity: 0; width: 100%; height: 100%;
            position: absolute; z-index: 5; transition: opacity 1s;
            overflow-y: auto; padding: 20px; box-sizing: border-box;
            color: white; text-align: center;
        }

        #gallery-screen.active { display: block; opacity: 1; }

        .neon-footer-text {
            font-size: 0.9em;
            letter-spacing: 1.5px;
            background: linear-gradient(270deg, #007bff, #ffffff, #00c6ff, #ffffff);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientMove 5s ease infinite;
        }

        footer { margin-top: 40px; padding: 15px 0; }
    </style>
</head>
<body oncontextmenu="return showAlert(event)">

    <div id="custom-alert">Copyright - Acesso Proibido</div>

    <div class="background-animation">
        <div class="big-star" style="width: 6px; height: 6px; top: 10%; left: 15%;"></div>
        <div class="big-star" style="width: 10px; height: 10px; top: 80%; left: 50%; animation-delay: 0.5s;"></div>
    </div>

    <div id="intro-screen">
        <h1 class="gradient-text-anim" style="font-size: 4em;">Galeria de Gifs</h1>
        <button class="gradient-btn-anim" id="btn-entrar">Entrar</button>
    </div>

    <div id="gallery-screen">
        <h2 class="gradient-text-anim" style="font-size: 2.5em;">GALERIA</h2>
        
        <footer>
            <div class="realtime-counter">
                VISITAS <span class="v-number" id="v-count">00000</span>
            </div>
            <div class="neon-footer-text">Galeria exclusiva 2026</div>
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // CONFIGURAÇÃO DO CONTADOR REALTIME
        // Nota: Utilizando uma estrutura de contador público para demonstração
        const firebaseConfig = {
            databaseURL: "https://contador-wrs-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('visitas_globais');

        function initRealtimeCounter() {
            // Escuta mudanças em tempo real
            db.on('value', (snapshot) => {
                const count = snapshot.val() || 0;
                document.getElementById('v-count').innerText = count.toString().padStart(5, '0');
            });

            // Incrementa apenas uma vez por sessão ao entrar
            db.transaction((currentValue) => {
                return (currentValue || 0) + 1;
            });
        }

        // Funções de Alerta e Navegação
        function showAlert(e) {
            if (e) e.preventDefault();
            const alertBox = document.getElementById('custom-alert');
            alertBox.style.display = 'block';
            setTimeout(() => { alertBox.style.display = 'none'; }, 2000);
            return false;
        }

        document.getElementById('btn-entrar').onclick = () => {
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => { 
                document.getElementById('intro-screen').style.display = 'none'; 
                document.getElementById('gallery-screen').classList.add('active');
                initRealtimeCounter(); // Ativa o tempo real
            }, 1000);
        };
    </script>
</body>
</html>
