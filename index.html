<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galeria Profissional WRS</title>
    
    <!-- 1. Otimização de Rede: Abre as portas para o servidor de arquivos imediatamente[cite: 2] -->
    <script>
        const preconnects = ['https://dl.dropboxusercontent.com', 'https://www.dropbox.com', 'https://i.imgur.com'];
        preconnects.forEach(url => {
            const link = document.createElement('link');
            link.rel = 'preconnect';
            link.href = url;
            link.crossOrigin = "anonymous";
            document.head.appendChild(link);
        });
    </script>

    <style>
        :root {
            --neon-blue: #0048FF;
            --bg-dark: #050505;
            --card-bg: rgba(17, 17, 17, 0.5);
            --deep-blue-bar: rgba(0, 10, 31, 0.5); 
        }

        /* Otimização de Renderização Prioritária[cite: 2] */
        img {
            content-visibility: auto;
            contain-intrinsic-size: 300px 300px;
            image-rendering: -webkit-optimize-contrast;
            backface-visibility: hidden;
            transform: translateZ(0); /* Aceleração por hardware[cite: 2] */
        }
        
        .gallery-container, section, div {
            will-change: transform; /* Evita travamentos no scroll[cite: 2] */
        }

        html, body {
            height: 100%;
            overflow: hidden;
            overscroll-behavior-y: contain; 
            background-color: var(--bg-dark);
        }

        /* Scrollbar Personalizada */
        ::-webkit-scrollbar { width: 8px; height: 0px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.5); }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; box-shadow: 0 0 10px var(--neon-blue); }

        /* Estilos de Interface */
        body {
            background-image: url('https://i.imgur.com/f1Lt3R2.jpeg'); background-attachment: fixed; background-size: cover; background-position: center;
            color: white; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh;
            user-select: none; -webkit-user-select: none; overflow-x: hidden;
        }

        .cursor-star { position: absolute; background: #fff; width: 4px; height: 4px; border-radius: 50%; pointer-events: none; z-index: 1000002; box-shadow: 0 0 5px #fff, 0 0 20px var(--neon-blue); animation: trailFade 0.7s linear forwards; }
        @keyframes trailFade { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0.2); opacity: 0; } }

        .copy-alert { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(5, 5, 5, 0.95); border: 2px solid var(--neon-blue); padding: 30px; z-index: 10000; text-align: center; box-shadow: 0 0 50px var(--neon-blue); border-radius: 10px; }

        #intro-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://i.imgur.com/B6cG2f7.jpeg') center/cover no-repeat; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 1s ease, transform 1s ease; }
        .moldura-flutuante { width: 280px; height: 280px; border: 3px solid var(--neon-blue); border-radius: 15px; overflow: hidden; box-shadow: 0 0 30px var(--neon-blue); animation: float 3s ease-in-out infinite; margin-bottom: 40px; background: rgba(0,0,0,0.5); position: relative; }
        .moldura-flutuante img { width: 100%; height: 100%; object-fit: contain; }
        
        #status-dot { position: absolute; bottom: 10px; right: 10px; width: 20px; height: 20px; border-radius: 50%; border: 3px solid white; background-color: #9e9e9e; }

        .btn-entrar, .btn-xat { font-weight: bold; color: white; text-transform: uppercase; border: none; border-radius: 50px; cursor: pointer; background: linear-gradient(-45deg, #0048FF, #ffffff, #0048FF, #ffffff); background-size: 300%; animation: moveGradient 4s linear infinite; box-shadow: 0 0 20px rgba(0, 72, 255, 0.6); transition: 0.3s; margin: 5px; padding: 15px 60px; }
        .btn-xat { padding: 8px 30px; font-size: 14px; }

        .perfil-header { text-align: center; padding: 20px; border-bottom: 2px solid var(--neon-blue); background: rgba(5, 5, 5, 0.5); z-index: 10; }
        .perfil-header h1 { font-size: 2.5rem; margin: 0; background: linear-gradient(-45deg, #0048FF, #ffffff, #0048FF, #ffffff); background-size: 300%; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: moveGradient 4s linear infinite; }

        .main-wrapper { display: flex; flex: 1; overflow: hidden; }
        .nav-container { width: 250px; padding: 15px; background: rgba(0, 0, 0, 0.4); border-right: 1px solid var(--neon-blue); overflow-y: auto; transition: transform 0.5s; }
        .content-area { flex: 1; padding: 30px; overflow-y: auto; position: relative; }

        .nav-btn { background: var(--deep-blue-bar); border: 1px solid rgba(0, 38, 138, 0.5); padding: 12px; cursor: pointer; font-weight: bold; color: white; width: 100%; text-align: left; margin-bottom: 8px; transition: 0.3s; }
        .nav-btn:hover, .nav-btn.active { border-color: var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue); background: rgba(0, 72, 255, 0.3); transform: translateX(8px); }

        .marquee-container { background: var(--deep-blue-bar); border: 1px solid rgba(0, 38, 138, 0.5); width: 100%; overflow: hidden; margin-bottom: 20px; padding: 15px 0; position: relative; height: 30px; }
        .marquee-content { white-space: nowrap; position: absolute; animation: linear-scroll-inside 15s linear infinite; }
        .texto-animado { font-weight: bold; font-size: 20px; background: linear-gradient(to right, #0048FF, #ffffff, #0048FF, #ffffff); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: moveGradient 3s linear infinite; }

        .grid-container, .grid-gifs { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
        .grid-gifs { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }

        .card { background: var(--card-bg); border: 1px solid rgba(34, 34, 34, 0.5); border-radius: 4px; overflow: hidden; text-align: center; transition: 0.3s; cursor: zoom-in; }
        .card:hover { border-color: var(--neon-blue); box-shadow: 0 0 25px var(--neon-blue); transform: scale(1.05); }
        .card img { width: 100%; display: block; }

        .info-card { background: var(--card-bg); border: 1px solid rgba(34, 34, 34, 0.5); padding: 20px; border-radius: 4px; margin-bottom: 20px; }

        @keyframes linear-scroll-inside { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        @keyframes moveGradient { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-content { max-width: 85%; max-height: 85%; border: 2px solid var(--neon-blue); }

        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body oncontextmenu="showAlert(); return false;">

    <div id="copyright-alert" class="copy-alert">
        <h3 style="color: var(--neon-blue);">COPYRIGHT - ACESSO PROIBIDO</h3>
        <p>Propriedade de Gabr (1777777)</p>
    </div>

    <div id="intro-screen">
        <div class="moldura-flutuante">
            <img src="https://i.imgur.com/pKuY3f8.gif">
            <div id="status-dot"></div>
        </div>
        <button class="btn-entrar" onclick="entrarGaleria()">Entrar</button>
    </div>

    <div class="perfil-header">
        <h1>GALERIA DE GIFS</h1>
        <p>Gabr (1777777)</p>
    </div>

    <div class="main-wrapper">
        <div class="nav-container">
            <button class="nav-btn active" onclick="showTab('inicio')">Início</button>
            <button class="nav-btn" onclick="showTab('gifs')">GIFS</button>
            <button class="nav-btn" onclick="showTab('pcback-gif')">PCBACK GIFS</button>
            <button class="nav-btn" onclick="showTab('pstyle-gif')">PSTYLE GIFS</button>
            <button class="nav-btn" onclick="showTab('pcback-est')">PCBACK ESTÁTICO</button>
            <button class="nav-btn" onclick="showTab('pstyle-est')">PSTYLE ESTÁTICO</button>
            <button class="nav-btn" onclick="showTab('fundos')">FUNDOS</button>
        </div>

        <div class="content-area">
            <div id="inicio" class="section active">
                <div class="info-card"><h3>Sobre</h3><p>Vendo Gifs, Pcback, Pstyle e Fundos para XAT - Married Mnna (1013) ❤️</p></div>
                <div class="info-card"><h3>IDs à Venda</h3><p>1553333005, 1553333013, 1553333024, 1553333040, 1553333505...</p></div>
            </div>
            <div id="gifs" class="section"></div>
            <div id="pcback-gif" class="section"></div>
            <div id="pstyle-gif" class="section"></div>
            <div id="pcback-est" class="section"></div>
            <div id="pstyle-est" class="section"></div>
            <div id="fundos" class="section"></div>
        </div>
    </div>

    <div id="modalZoom" class="modal" onclick="this.style.display='none'"><img id="imgZoom" class="modal-content"></div>

    <script>
        // 2. Script de Renderização Prioritária (Intersection Observer)[cite: 2]
        const observerOptions = { root: null, rootMargin: '200px 0px', threshold: 0.01 };

        const optimizeImage = (img) => {
            img.loading = "lazy";
            img.decoding = "async";
            img.setAttribute("fetchpriority", "low");
        };

        const imageObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    optimizeImage(img);
                    imageObserver.unobserve(img);
                }
            });
        }, observerOptions);

        function entraGaleria() {
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('intro-screen').style.display = 'none', 1000);
        }

        function entrarGaleria() { entraGaleria(); }

        function showAlert() {
            const alertBox = document.getElementById('copyright-alert');
            alertBox.style.display = 'block';
            setTimeout(() => alertBox.style.display = 'none', 2500);
        }

        function showTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function openZoom(src) {
            document.getElementById('imgZoom').src = src;
            document.getElementById('modalZoom').style.display = 'flex';
        }

        function render() {
            const sections = [
                { id: 'gifs', marquee: "✧ AFTEREFECTS - 400 XATS ✧", prefix: "After", urls: ['5HxfNaB', 'FILAVQP', '5IoR515', 'KUQ1WsX', 'ZuaO9n5'] },
                { id: 'pcback-gif', marquee: "✧ PCBACK GIF - 450 XATS ✧", prefix: "PCBack", urls: ['SFnk7A6', 'KKY2zqU', 'fmhynyY'] }
            ];

            sections.forEach(sec => {
                const target = document.getElementById(sec.id);
                let html = `<div class="marquee-container"><div class="marquee-content"><span class="texto-animado">${sec.marquee}</span></div></div><div class="grid-gifs">`;
                
                sec.urls.forEach((id, index) => {
                    // Aplica prioridade para os primeiros itens da galeria[cite: 2]
                    const priority = index < 4 ? 'fetchpriority="high" decoding="sync"' : 'loading="lazy"';
                    html += `
                        <div class="card" onclick="openZoom('https://i.imgur.com/${id}.gif')">
                            <img src="https://i.imgur.com/${id}.gif" ${priority} alt="Galeria">
                            <div style="padding:5px; font-size:10px;">${sec.prefix} ${index+1}</div>
                        </div>`;
                });
                target.innerHTML = html + `</div>`;
            });

            // Inicia observação de imagens após renderização[cite: 2]
            document.querySelectorAll('.card img').forEach((img, idx) => {
                if (idx >= 4) imageObserver.observe(img);
            });
        }

        window.onload = render;

        // Efeito de estrelas no mouse
        document.addEventListener('mousemove', (e) => {
            const star = document.createElement('div');
            star.className = 'cursor-star';
            star.style.left = e.pageX + 'px'; star.style.top = e.pageY + 'px';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 700);
        });
    </script>
</body>
</html>
