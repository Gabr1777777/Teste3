<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Galeria de GIFs</title>
    <style>
        /* --- Reset e Estilos Básicos --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000022; 
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        /* --- MENSAGEM DE ALERTA CUSTOMIZADA --- */
        #custom-alert {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 31, 77, 0.95);
            border: 2px solid #007bff;
            color: white;
            padding: 20px 40px;
            border-radius: 10px;
            z-index: 9999;
            box-shadow: 0 0 30px rgba(0, 123, 255, 0.5);
            text-align: center;
            font-weight: bold;
            font-size: 1.2em;
            pointer-events: none;
        }

        /* --- FUNDO ANIMADO --- */
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #001f4d 0%, #00001a 100%);
            z-index: -1;
            overflow: hidden;
        }

        .big-star {
            position: absolute;
            background: white;
            border-radius: 50%;
            filter: blur(1px);
            box-shadow: 0 0 10px white, 0 0 20px white;
            opacity: 0;
            animation: bigStarBlink 4s infinite ease-in-out;
        }

        @keyframes bigStarBlink {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }

        .floating-light {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            animation: floatGlow 12s infinite linear;
            filter: blur(3px);
        }

        @keyframes floatGlow {
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* --- ANIMAÇÕES --- */
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes marquee-dynamic {
            0% { transform: translateX(var(--marquee-start)); }
            100% { transform: translateX(var(--marquee-end)); }
        }

        /* --- PLAYER DE MÚSICA (ACIMA DO LETREIRO) --- */
        .music-player-home {
            width: 100%;
            max-width: 960px;
            margin: 0 auto 10px auto;
            background: rgba(0, 17, 51, 0.8);
            border-radius: 12px;
            padding: 10px 20px;
            border: 2px solid transparent;
            background-image: linear-gradient(rgba(0, 17, 51, 0.9), rgba(0, 17, 51, 0.9)), 
                              linear-gradient(270deg, #007bff, #ffffff, #00c6ff, #ffffff);
            background-origin: border-box;
            background-clip: content-box, border-box;
            background-size: 400% 400%;
            animation: gradientMove 5s ease infinite;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            flex-wrap: wrap;
            gap: 10px;
        }

        .track-info {
            color: #00c6ff;
            font-weight: bold;
            text-shadow: 0 0 5px #007bff;
            font-size: 0.9em;
            max-width: 250px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .player-controls-wrap {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .player-btns {
            display: flex;
            gap: 15px;
        }

        .btn-audio {
            background: none;
            border: none;
            color: white;
            font-size: 1.4em;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-audio:hover {
            color: #00c6ff;
            transform: scale(1.2);
        }

        .volume-slider {
            width: 80px;
            cursor: pointer;
            accent-color: #007bff;
        }

        /* --- ESTILO DO LETREIRO --- */
        .container-letreiro-wrs {
            width: 100%;
            max-width: 960px;
            height: 100px;
            margin: 0 auto 20px auto;
            position: relative;
            border-radius: 12px;
            border: 2px solid #007bff;
            overflow: hidden;
            background: #001133; 
            display: flex;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.3);
        }

        .texto-letreiro-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
        }

        .texto-letreiro-wrapper span {
            display: inline-block;
            font-size: 2.2em;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #007bff;
            animation: marquee-dynamic 15s linear infinite;
        }

        .gradient-text-anim {
            background: linear-gradient(270deg, #ffffff, #007bff, #ffffff, #007bff);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientMove 5s ease infinite;
        }

        .gradient-btn-anim {
            background: linear-gradient(270deg, #007bff, #ffffff, #007bff, #ffffff);
            background-size: 400% 400%;
            color: #000033;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            animation: gradientMove 5s ease infinite;
            transition: box-shadow 0.3s ease, transform 0.2s;
        }

        #btn-entrar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            animation: gradientMove 5s ease infinite, floating 3s ease-in-out infinite;
        }

        .animated-bar {
            background: linear-gradient(90deg, #007bff, #00c6ff, #007bff);
            background-size: 200% auto;
            padding: 8px 0;
            border-radius: 4px;
            font-weight: bold;
            margin-bottom: 15px;
            overflow: hidden; 
            white-space: nowrap;
            position: relative;
            display: flex;
        }

        .animated-bar span {
            display: inline-block;
            animation: marquee-dynamic 12s linear infinite; 
            will-change: transform;
        }

        footer {
            margin-top: 40px;
            padding: 15px 0;
            text-align: center;
            width: 100%;
        }

        .neon-footer-text {
            font-size: 0.9em; 
            background: linear-gradient(270deg, #007bff, #ffffff, #00c6ff, #ffffff);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientMove 5s ease infinite;
            filter: drop-shadow(0 0 5px #007bff);
        }

        /* --- ESTRUTURA DE TELAS --- */
        #intro-screen {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            width: 100%; height: 100%; position: absolute; z-index: 10;
            transition: opacity 1s;
        }

        #gallery-screen {
            display: none; opacity: 0; width: 100%; height: 100%;
            position: absolute; z-index: 5; transition: opacity 1s;
            overflow-y: auto; padding: 20px; box-sizing: border-box;
            color: white; text-align: center;
        }

        #gallery-screen.active { display: block; opacity: 1; }

        .profile-frame {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 3px solid #fff;
            margin: 10px auto;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            animation: floating 4s ease-in-out infinite;
        }
        .profile-frame img { width: 100%; height: 100%; object-fit: cover; }

        .nav-buttons { margin: 20px 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .content-section { display: none; margin-top: 20px; max-width: 1000px; margin-left: auto; margin-right: auto; }
        .content-section.active { display: block; }
        .gif-grid { display: grid; gap: 15px; margin-bottom: 30px; }
        .grid-compact { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        .gif-item { background: rgba(255, 255, 255, 0.1); padding: 8px; border-radius: 5px; transition: 0.3s; }
        .gif-item img { width: 100%; border-radius: 3px; }
    </style>
</head>
<body oncontextmenu="return showAlert(event)">

    <div id="custom-alert">Copyright - Acesso Proibido</div>

    <div class="background-animation">
        <div class="big-star" style="width: 6px; height: 6px; top: 10%; left: 15%;"></div>
        <div class="big-star" style="width: 8px; height: 8px; top: 40%; left: 85%;"></div>
        <div class="big-star" style="width: 10px; height: 10px; top: 80%; left: 50%;"></div>
    </div>

    <div id="intro-screen">
        <h1 class="gradient-text-anim" style="font-size: 4em;">Galeria de Gifs</h1>
        <button class="gradient-btn-anim" id="btn-entrar">Entrar</button>
    </div>

    <div id="gallery-screen">
        <div class="profile-frame"><img src="https://imgur.com/7rKeKT8.png"></div>
        <h2 class="gradient-text-anim" style="font-size: 2.5em;">GALERIA</h2>

        <div class="nav-buttons">
            <button class="gradient-btn-anim" id="btn-home">Home</button>
            <button class="gradient-btn-anim" id="btn-gifs">Gifs</button>
            <button class="gradient-btn-anim" id="btn-pcback">Pcback Gif</button>
        </div>

        <div id="section-home" class="content-section active">
            <div class="music-player-home">
                <div id="track-name" class="track-info">Playlist</div>
                <div class="player-controls-wrap">
                    <div class="player-btns">
                        <button class="btn-audio" onclick="prevTrack()">⏮</button>
                        <button id="play-pause" class="btn-audio" onclick="togglePlay()">▶</button>
                        <button class="btn-audio" onclick="nextTrack()">⏭</button>
                    </div>
                    <input type="range" id="volume-control" class="volume-slider" min="0" max="1" step="0.1" value="0.5">
                </div>
                <audio id="main-audio" src=""></audio>
            </div>

            <div class="container-letreiro-wrs">
                <div class="texto-letreiro-wrapper">
                    <span>Gifs / Pcback Gif / Pstyle Gif / Estáticos / Design Personalizado</span>
                </div>
            </div>
        </div>

        <footer>
            <div class="neon-footer-text">Galeria exclusiva 2026</div>
            <div style="margin-top: 15px; font-family: monospace; color: #007bff; font-size: 0.8rem;">
                VISITAS: <span id="v-count">00000</span>
            </div>
        </footer>
    </div>

    <script>
        const playlist = [
            { name: "Eminem - You dont know", url: "https://cdn.discordapp.com/attachments/1489682267264520284/1489684282887639140/Eminem-you-dont-know.mp3.mp3?ex=69d73eda&is=69d5ed5a&hm=ed020c05ff12ac429b5329d8d76a87dfb4cb913bb84c1c63e95a55601888e9c2&" },
            { name: "The Sound of Silence – Rising to the Night", url: "https://cdn.discordapp.com/attachments/1489682267264520284/1489684333672403135/sound-of-silence.mp3.mp3?ex=69d73ee6&is=69d5ed66&hm=3aacc36f062b5a9d803e187d8905efa1fdc3f8f0566bf5a5e6fb542e26dd5076&" },
            { name: "Desireless - Voyage Voyage", url: "https://cdn.discordapp.com/attachments/1489682267264520284/1489684260460822640/Desireless-voyage-voyage.mp3.mp3?ex=69d73ed4&is=69d5ed54&hm=c0cf049750dc9464d0e86caa7a9042a01f9bce3be05117c7b956c8934302dde3&" }
        ];

        let currentTrack = 0;
        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-pause');
        const trackLabel = document.getElementById('track-name');
        const volumeControl = document.getElementById('volume-control');

        function loadTrack(index) {
            audio.src = playlist[index].url;
            trackLabel.innerText = playlist[index].name;
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "⏸";
            } else {
                audio.pause();
                playBtn.innerText = "▶";
            }
        }

        function nextTrack() {
            currentTrack = (currentTrack + 1) % playlist.length;
            loadTrack(currentTrack);
            audio.play();
            playBtn.innerText = "⏸";
        }

        function prevTrack() {
            currentTrack = (currentTrack - 1 + playlist.length) % playlist.length;
            loadTrack(currentTrack);
            audio.play();
            playBtn.innerText = "⏸";
        }

        volumeControl.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });

        audio.onended = nextTrack;
        loadTrack(currentTrack);
        audio.volume = 0.5;

        // BOTÃO ENTRAR: Inicia o som e muda a tela
        document.getElementById('btn-entrar').onclick = () => {
            document.getElementById('intro-screen').style.opacity = '0';
            // Inicia o áudio aqui
            audio.play().catch(e => console.log("Erro ao tocar áudio automaticamente"));
            playBtn.innerText = "⏸";
            
            setTimeout(() => { 
                document.getElementById('intro-screen').style.display = 'none'; 
                document.getElementById('gallery-screen').classList.add('active');
                updateMarqueeProperties();
                updateCounter(); 
            }, 1000);
        };

        function updateCounter() {
            let c = localStorage.getItem('Galeria_Privada_v') || 0;
            c++;
            localStorage.setItem('Galeria_Privada_v', c);
            document.getElementById('v-count').innerText = c.toString().padStart(5, '0');
        }

        function showAlert(e) { if(e) e.preventDefault(); document.getElementById('custom-alert').style.display='block'; setTimeout(()=>{document.getElementById('custom-alert').style.display='none'},2000); return false; }

        function show(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            updateMarqueeProperties();
        }

        document.getElementById('btn-home').onclick = () => show('section-home');
        document.getElementById('btn-gifs').onclick = () => show('section-gifs');

        function updateMarqueeProperties() {
            const spans = document.querySelectorAll('.animated-bar span, .texto-letreiro-wrapper span');
            spans.forEach(span => {
                span.style.setProperty('--marquee-start', span.parentElement.offsetWidth + 'px');
                span.style.setProperty('--marquee-end', '-' + span.offsetWidth + 'px');
            });
        }
        window.addEventListener('resize', updateMarqueeProperties);
    </script>
</body>
</html>
