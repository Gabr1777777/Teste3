<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gabr | Galeria Oficial WRS</title>
    
    <script>
        // Otimização de Pré-conexão para carregamento ultrarrápido
        ['https://i.imgur.com', 'https://dl.dropboxusercontent.com'].forEach(url => {
            const link = document.createElement('link');
            link.rel = 'preconnect';
            link.href = url;
            link.crossOrigin = "anonymous";
            document.head.appendChild(link);
        });
    </script>

    <style>
        :root {
            --neon-blue: #0048FF;
            --bg-dark: #050505;
            --card-bg: rgba(17, 17, 17, 0.7);
            --deep-blue-bar: rgba(0, 10, 31, 0.8); 
        }

        /* Reset e Performance */
        * { box-sizing: border-box; }
        body { 
            background: var(--bg-dark) url('https://i.imgur.com/f1Lt3R2.jpeg') fixed center/cover;
            color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* Scrollbar Estilizada */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }

        /* Header e Botão XatSpace */
        .header { 
            padding: 15px; text-align: center; border-bottom: 2px solid var(--neon-blue);
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
        }
        .header h1 { margin: 0; font-size: 22px; letter-spacing: 2px; color: #fff; text-shadow: 0 0 10px var(--neon-blue); }
        
        .btn-xatspace {
            display: inline-block; margin-top: 10px; padding: 8px 20px;
            background: linear-gradient(45deg, #0048FF, #001a5e);
            color: white; text-decoration: none; border-radius: 20px;
            font-weight: bold; font-size: 12px; transition: 0.3s;
            border: 1px solid #fff; box-shadow: 0 0 15px rgba(0,72,255,0.5);
        }
        .btn-xatspace:hover { transform: scale(1.1); box-shadow: 0 0 25px var(--neon-blue); }

        /* Layout Principal */
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Menu Lateral */
        .sidebar { 
            width: 220px; background: rgba(0,0,0,0.8); border-right: 1px solid var(--neon-blue);
            padding: 15px; overflow-y: auto;
        }
        .nav-item {
            width: 100%; padding: 12px; margin-bottom: 10px;
            background: var(--deep-blue-bar); border: 1px solid #00268a;
            color: white; cursor: pointer; text-align: left; transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { 
            background: var(--neon-blue); border-color: #fff; transform: translateX(5px);
        }

        /* Área de Conteúdo */
        .content { flex: 1; padding: 20px; overflow-y: auto; position: relative; }

        /* Grid de Itens */
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 15px; margin-top: 20px;
        }
        .item-card { 
            background: var(--card-bg); border: 1px solid #333; border-radius: 5px;
            overflow: hidden; transition: 0.3s; cursor: pointer; text-align: center;
        }
        .item-card:hover { border-color: var(--neon-blue); transform: translateY(-5px); }
        .item-card img { width: 100%; height: auto; display: block; content-visibility: auto; } /*[cite: 2] */
        .item-info { padding: 8px; font-size: 11px; color: #aaa; border-top: 1px solid #222; }

        /* Marquee */
        .marquee {
            background: rgba(0, 72, 255, 0.2); padding: 10px;
            border: 1px solid var(--neon-blue); margin-bottom: 20px;
            overflow: hidden; white-space: nowrap;
        }
        .marquee span { 
            display: inline-block; animation: scroll 15s linear infinite; 
            font-weight: bold; color: #fff;
        }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* Modal de Zoom */
        .modal { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal img { max-width: 90%; max-height: 90%; border: 2px solid var(--neon-blue); }

        /* Intro */
        #intro {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #000 url('https://i.imgur.com/B6cG2f7.jpeg') center/cover;
            z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-enter {
            padding: 20px 60px; font-size: 20px; background: var(--neon-blue);
            color: #fff; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 30px var(--neon-blue); transition: 0.5s;
        }
        .btn-enter:hover { letter-spacing: 5px; background: #fff; color: #000; }
    </style>
</head>
<body>

    <div id="intro">
        <div style="width:250px; height:250px; border:2px solid var(--neon-blue); border-radius:15px; overflow:hidden; margin-bottom:30px; box-shadow: 0 0 20px var(--neon-blue);">
            <img src="https://i.imgur.com/pKuY3f8.gif" style="width:100%; height:100%; object-fit: cover;">
        </div>
        <button class="btn-enter" onclick="iniciar()">ENTRAR</button>
    </div>

    <div class="header">
        <h1>GABR | STORE 2026</h1>
        <!-- Botão XatSpace solicitado -->
        <a href="https://xat.me/Gabr" target="_blank" class="btn-xatspace">VISITAR XATSPACE</a>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <button class="nav-item active" onclick="tab('home')">INÍCIO / IDs</button>
            <button class="nav-item" onclick="tab('gifs')">GIFS EXCLUSIVOS</button>
            <button class="nav-item" onclick="tab('pcback')">PCBACK GIFS</button>
            <button class="nav-item" onclick="tab('pstyle')">PSTYLE GIFS</button>
            <button class="nav-item" onclick="tab('estaticos')">ESTÁTICOS</button>
            <button class="nav-item" onclick="tab('fundos')">FUNDOS HD</button>
        </div>

        <div class="content" id="content-area">
            <!-- As seções são geradas via JavaScript abaixo -->
        </div>
    </div>

    <div class="modal" id="modal" onclick="this.style.display='none'"><img id="modal-img"></div>

    <script>
        // BANCO DE DADOS DA GALERIA (Adicione os IDs do Imgur aqui)
        const DATABASE = {
            ids: ["1553333005", "1553333013", "1553333024", "1553333040", "1553333505", "1553333000"],
            gifs: ["5HxfNaB", "FILAVQP", "5IoR515", "KUQ1WsX", "ZuaO9n5", "v9I3Osh", "8X6xI9W"],
            pcback: ["SFnk7A6", "KKY2zqU", "fmhynyY", "6Wf8K0s"],
            pstyle: ["5HxfNaB", "FILAVQP"],
            estaticos: ["f1Lt3R2", "B6cG2f7"],
            fundos: ["f1Lt3R2", "B6cG2f7"]
        };

        function iniciar() {
            document.getElementById('intro').style.display = 'none';
            tab('home');
        }

        function openZoom(url) {
            document.getElementById('modal-img').src = url;
            document.getElementById('modal').style.display = 'flex';
        }

        function tab(name) {
            const area = document.getElementById('content-area');
            let html = "";

            // Lógica de abas
            if(name === 'home') {
                html = `
                    <div class="marquee"><span>VENDA DE IDs - GIFS - PCBACKS - QUALIDADE WRS 2026</span></div>
                    <h3>IDs DISPONÍVEIS</h3>
                    <div class="grid">
                        ${DATABASE.ids.map(id => `<div class="item-card" style="padding:20px; font-weight:bold; color:var(--neon-blue); font-size:18px;">${id}</div>`).join('')}
                    </div>
                `;
            } else {
                const list = DATABASE[name] || [];
                const prefix = name.toUpperCase();
                html = `<h3>${prefix}</h3><div class="grid">`;
                list.forEach((imgId, i) => {
                    // Carregamento otimizado: os 4 primeiros carregam antes[cite: 2]
                    const lazy = i > 4 ? 'loading="lazy"' : 'fetchpriority="high"';
                    html += `
                        <div class="item-card" onclick="openZoom('https://i.imgur.com/${imgId}.gif')">
                            <img src="https://i.imgur.com/${imgId}.gif" ${lazy}>
                            <div class="item-info">${prefix} #${i+1}</div>
                        </div>`;
                });
                html += `</div>`;
            }

            area.innerHTML = html;
            
            // Atualiza botões
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase().includes(name.substring(0,3))) btn.classList.add('active');
            });
        }
    </script>
</body>
</html>
