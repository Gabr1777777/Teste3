<script>
    /* Bloqueio de arrastar imagens e seleção */
    document.addEventListener('dragstart', function(e) {
        if (e.target.nodeName === 'IMG') e.preventDefault();

<style>
    /* Trava de Seleção de Texto e Estilo Base */
    * {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        box-sizing: border-box;
    }

    :root {
        --neon-blue: #0048FF;
        --neon-pink: #E330DB; /* Sua cor preferida atualizada */
        --online-green: #00FF41;
    }

    /* Efeito de Pulsação do Botão Online */
    .status-online {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(0, 255, 65, 0.1);
        border: 1px solid var(--online-green);
        color: var(--online-green);
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
        text-transform: uppercase;
        box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        margin: 10px 0;
    }

    .pulse-dot {
        width: 8px;
        height: 8px;
        background-color: var(--online-green);
        border-radius: 50%;
        box-shadow: 0 0 0 rgba(0, 255, 65, 0.4);
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 65, 0.7); }
        70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 65, 0); }
        100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 65, 0); }
    }

    /* Nome com Gradiente Animado */
    .nome-animado {
        font-weight: bold;
        letter-spacing: 2px;
        background: linear-gradient(-45deg, var(--neon-blue), #ffffff, var(--neon-pink), #ffffff);
        background-size: 300%;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: moveGradient 4s linear infinite;
    }

    @keyframes moveGradient { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }

    /* Botão Xatspace Personalizado */
    .btn-xatspace {
        background: linear-gradient(45deg, #111, #222);
        border: 1px solid var(--neon-blue);
        color: white;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
        text-decoration: none;
        display: inline-block;
    }

    .btn-xatspace:hover {
        background: var(--neon-blue);
        box-shadow: 0 0 20px var(--neon-blue);
    }
</style>
